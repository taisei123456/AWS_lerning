AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Simple Todo API with Lambda + API Gateway + DynamoDB

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128

Resources:
  TodoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-TodoTasks"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  TodoApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-TodoApiFunction"
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref TodoTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TodoTable
      Events:
        CreateTask:
          Type: HttpApi
          Properties:
            Path: /tasks
            Method: POST
        ListTasks:
          Type: HttpApi
          Properties:
            Path: /tasks
            Method: GET
        GetTask:
          Type: HttpApi
          Properties:
            Path: /tasks/{id}
            Method: GET
        DeleteTask:
          Type: HttpApi
          Properties:
            Path: /tasks/{id}
            Method: DELETE

Outputs:
  ApiBaseUrl:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  TodoTableName:
    Description: DynamoDB table name
    Value: !Ref TodoTable
